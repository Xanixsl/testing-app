name: External Resolver

# Запускается раз в 10 минут (минимум, который позволяет GitHub).
# IP GitHub-runner'ов не в чёрных списках YouTube/SoundCloud,
# поэтому yt-dlp здесь работает там, где Sprinthost не может.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

concurrency:
  group: external-resolver
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install yt-dlp
        run: python -m pip install --upgrade "yt-dlp>=2024.10.0"

      - name: Run resolver
        env:
          VELORA_BASE_URL: ${{ secrets.VELORA_BASE_URL }}
          RESOLVE_PUSH_TOKEN: ${{ secrets.RESOLVE_PUSH_TOKEN }}
          YT_COOKIES_B64: ${{ secrets.YT_COOKIES_B64 }}
          RESOLVE_LIMIT: "20"
        run: python .github/scripts/resolve_worker.py
