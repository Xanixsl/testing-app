<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Velora — Страница не найдена</title>
<style>
:root { color-scheme: dark; }
* { box-sizing: border-box; }
body {
    margin: 0; min-height: 100vh;
    background: radial-gradient(circle at 30% 20%, #2a2a2a 0, #0a0a0a 60%);
    color: #f5f5f7; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    display: flex; align-items: center; justify-content: center; padding: 24px;
}
.box { text-align: center; max-width: 460px; }
.code { font-size: 120px; font-weight: 800; line-height: 1; letter-spacing: -.05em;
    background: linear-gradient(135deg, #ffd84a, #ff8a3d); -webkit-background-clip: text; background-clip: text;
    color: transparent; margin: 0 0 12px; }
h1 { font-size: 24px; margin: 0 0 10px; }
p { color: #a0a0a8; margin: 0 0 24px; line-height: 1.5; }
a.btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: #ffd84a; color: #1a0d00; text-decoration: none;
    padding: 12px 22px; border-radius: 999px; font-weight: 700;
    transition: transform .12s;
}
a.btn:hover { transform: translateY(-1px); }
.hint { margin-top: 22px; font-size: 12px; color: #6b6b73; }
</style>
</head>
<body>
<div class="box">
    <div class="code">404</div>
    <h1>Страница не найдена</h1>
    <p>Возможно, ссылка устарела или ресурс был удалён. Если вы офлайн — некоторые страницы доступны только при подключении к интернету.</p>
    <a class="btn" href="/">На главную</a>
    <div class="hint">Velora · Music streaming</div>
</div>
</body>
</html>
